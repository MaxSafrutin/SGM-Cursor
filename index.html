<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SGM Auto Group — презентация</title>

    <link rel="icon" type="image/svg+xml" href="./assets/site/logo.svg" />
    <link rel="apple-touch-icon" href="./assets/site/logo.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./assets/theme.css?v=4" />
    <link rel="stylesheet" href="./assets/home.css?v=4" />
  </head>

  <body>
    <div class="bg" aria-hidden="true"></div>
    <div class="topline" aria-hidden="true"></div>

    <main class="wrap">
      <section class="card" aria-label="Меню презентаций">
        <div class="card__body">
          <div class="brand">
            <div class="logo" aria-label="SGM Auto Group">
              <img class="logo__mark" src="./assets/site/logo.svg" alt="SGM Auto Group" />
              <div class="logo__name">
                <span>Архитектура безопасной сделки</span>
              </div>
            </div>

            <button class="brand__action" id="btnVerifyCompany" type="button">
              Проверить компанию
            </button>
          </div>

          <h1>Интерактивная презентация</h1>
          <p class="lead">
            Импорт автомобилей с полным контролем логистики, необходиммых уплат, НДС и юридической
            чистоты на каждом этапе
          </p>

          <div id="sectionsList"></div>

          <p class="lead" style="margin-top: 14px; margin-bottom: 0; font-size: 13px;">
            <a
              href="./ram-choice.html"
              style="color: rgba(255,255,255,0.66); text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.12);"
              >Как выбрать RAM (служебно)</a
            >
          </p>
        </div>
      </section>
    </main>

    <div class="modalRoot" id="homeModalRoot" hidden></div>

    <script src="./assets/js/app.js?v=4" defer></script>
  </body>
</html>
